name: Python CI

on:
  workflow_call:
    inputs:
      source-dir:
        required: true
        type: string
        description: 'Source directory to lint and test (e.g., src/wai)'
      python-version:
        required: false
        type: string
        default: '3.12'
        description: 'Python version to use'
      run-mypy:
        required: false
        type: boolean
        default: false
        description: 'Run mypy type checking; errors block the build (opt-in)'

permissions:
  contents: read

jobs:
  lint:
    runs-on: blacksmith
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Verify source-dir exists
        run: |
          if [ ! -d "${{ inputs.source-dir }}" ]; then
            echo "::error::source-dir '${{ inputs.source-dir }}' does not exist in repo"
            exit 1
          fi

      - name: Run ruff (lint)
        run: ruff check ${{ inputs.source-dir }}

      - name: Run ruff (format check)
        run: ruff format --check ${{ inputs.source-dir }}

      - name: Run mypy
        if: ${{ inputs.run-mypy }}
        run: mypy ${{ inputs.source-dir }}

  test:
    runs-on: blacksmith
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=${{ inputs.source-dir }} --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
        continue-on-error: true
