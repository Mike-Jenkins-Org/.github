name: Secret Scanning

on:
  workflow_call:
    inputs:
      config-file:
        required: false
        type: string
        default: ''
        description: 'Optional path to .gitleaks.toml config file. If empty, gitleaks defaults are used.'

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: blacksmith
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(curl -sSfL -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r .tag_name | sed 's/^v//')
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "::error::Failed to determine latest gitleaks version"
            exit 1
          fi
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: |
          if [ -n "${{ inputs.config-file }}" ]; then
            gitleaks detect --source . --config "${{ inputs.config-file }}" --verbose
          else
            gitleaks detect --source . --verbose
          fi
